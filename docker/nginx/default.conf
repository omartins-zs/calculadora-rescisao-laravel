server {
    listen 8000;
    server_name localhost;
    root /app/public;

    # O Docker Embedded DNS Resolver no docker-compose costuma ser 127.0.0.11
    # Isso impede que o NGINX trave/retorne 502 permanentemente se o IP do app:9000 mudar (por causa de restart)
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    index index.php;

    charset utf-8;

    # Para interceptar falhas do 502 (Bad Gateway) proativamente caso app caia
    error_page 502 /502.html;
    location = /502.html {
        return 502 "O serviço da Calculadora está reiniciando (Cold Start / PHP-FPM). Aguarde alguns segundos e recarregue.";
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        # O uso da variavel forca o NGINX a re-resolver o DNS quando expirado
        set $upstream app:9000;
        fastcgi_pass $upstream;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # Evitar time-outs em ambiente local massivo no Windows
        fastcgi_read_timeout 300;
        fastcgi_connect_timeout 300;
        fastcgi_send_timeout 300;
    }

    # Vite / Static caching
    location ~* \.(?:css|js|map|jpe?g|gif|png|webp|svg|woff2?|eot|ttf|otf)$ {
        try_files $uri =404;
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
